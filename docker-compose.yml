services:
  # Kokoro TTS — CPU inference, no GPU needed
  # Voices: af_heart, af_bella, bm_george, bm_lewis, etc.
  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:v0.2.4
    ports:
      - "8880:8880"
    restart: unless-stopped
    # CPU inference is slower (~10-60s per paragraph) but free to run locally.
    # For faster inference, use the GPU image and a machine with CUDA.

  # Clarion server — TTS proxy + health endpoint
  clarion:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      KOKORO_SERVER: http://kokoro:8880
      # PIPER_SERVER: http://piper:5000  # add if you run Piper too
    depends_on:
      - kokoro
    restart: unless-stopped
