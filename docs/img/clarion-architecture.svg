<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <style>
      .bg { fill: #1e1d2e; }
      .box { fill: #272638; stroke: #3a3556; stroke-width: 1.5; rx: 8; }
      .box-accent { fill: #272638; stroke: #8272f0; stroke-width: 1.5; rx: 8; }
      .label { fill: #e8e4f0; font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 14px; text-anchor: middle; }
      .label-sm { fill: #b0aac8; font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 11px; text-anchor: middle; }
      .label-accent { fill: #8272f0; font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 12px; text-anchor: middle; }
      .arrow { stroke: #3a3556; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-accent { stroke: #8272f0; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-accent); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3a3556"/>
    </marker>
    <marker id="arrowhead-accent" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8272f0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="420"/>

  <!-- Browser UI -->
  <rect class="box-accent" x="250" y="20" width="300" height="50"/>
  <text class="label" x="400" y="50">Browser UI</text>
  <text class="label-sm" x="400" y="62">React 19 SPA</text>

  <!-- CLI -->
  <rect class="box" x="30" y="20" width="180" height="50"/>
  <text class="label" x="120" y="50">CLI Tools</text>
  <text class="label-sm" x="120" y="62">watch / speak / stream</text>

  <!-- Services layer -->
  <rect class="box" x="250" y="110" width="300" height="50"/>
  <text class="label" x="400" y="140">Services</text>
  <text class="label-sm" x="400" y="152">TTS client, crypto, storage</text>

  <!-- Server -->
  <rect class="box-accent" x="175" y="200" width="450" height="50"/>
  <text class="label" x="400" y="230">Clarion Server</text>
  <text class="label-sm" x="400" y="242">Hono — CF Workers or Node</text>

  <!-- Backends row -->
  <rect class="box" x="30" y="300" width="110" height="50"/>
  <text class="label" x="85" y="325">Edge TTS</text>
  <text class="label-sm" x="85" y="340">zero config</text>

  <rect class="box" x="155" y="300" width="110" height="50"/>
  <text class="label" x="210" y="325">Kokoro</text>
  <text class="label-sm" x="210" y="340">self-hosted</text>

  <rect class="box" x="280" y="300" width="110" height="50"/>
  <text class="label" x="335" y="325">Chatterbox</text>
  <text class="label-sm" x="335" y="340">GPU clone</text>

  <rect class="box" x="405" y="300" width="110" height="50"/>
  <text class="label" x="460" y="325">Piper</text>
  <text class="label-sm" x="460" y="340">lightweight</text>

  <rect class="box" x="530" y="300" width="110" height="50"/>
  <text class="label" x="585" y="325">ElevenLabs</text>
  <text class="label-sm" x="585" y="340">paid API</text>

  <rect class="box" x="655" y="300" width="115" height="50"/>
  <text class="label" x="712" y="325">Google HD</text>
  <text class="label-sm" x="712" y="340">paid API</text>

  <!-- Domain layer (small, side) -->
  <rect class="box" x="600" y="110" width="170" height="50"/>
  <text class="label" x="685" y="140">Domain</text>
  <text class="label-sm" x="685" y="152">agent model, voices</text>

  <!-- Arrows -->
  <!-- UI to Services -->
  <line class="arrow-accent" x1="400" y1="70" x2="400" y2="108"/>
  <!-- Services to Server -->
  <line class="arrow" x1="400" y1="160" x2="400" y2="198"/>
  <!-- Server to backends -->
  <line class="arrow" x1="250" y1="250" x2="85" y2="298"/>
  <line class="arrow" x1="310" y1="250" x2="210" y2="298"/>
  <line class="arrow" x1="370" y1="250" x2="335" y2="298"/>
  <line class="arrow" x1="430" y1="250" x2="460" y2="298"/>
  <line class="arrow" x1="500" y1="250" x2="585" y2="298"/>
  <line class="arrow" x1="560" y1="250" x2="712" y2="298"/>
  <!-- CLI to Server -->
  <line class="arrow" x1="120" y1="70" x2="250" y2="198"/>

  <!-- Labels on arrows -->
  <text class="label-accent" x="440" y="95">fetch / audio</text>
  <text class="label-sm" x="440" y="185">HMAC-signed</text>

  <!-- Footer -->
  <text class="label-sm" x="400" y="390">All backends return audio/mpeg — Edge TTS is always available as fallback</text>
  <text class="label-sm" x="400" y="406">Agent profiles stored in localStorage (browser) or ~/.config/clarion/ (CLI)</text>
</svg>
